<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>省心租 - 王女士专属托管方案</title>
<style>
:root {
  --primary: #1a2332;
  --primary-light: #2c3e50;
  --accent: #c9a84c;
  --accent-light: #f5e6b8;
  --bg: #f5f6fa;
  --card: #ffffff;
  --text: #2c3e50;
  --text-secondary: #7f8c8d;
  --success: #27ae60;
  --success-light: #eafaf1;
  --border: #e8e8e8;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 24px 20px 60px;
}

/* ===== 头部封面 ===== */
.header {
  background: linear-gradient(135deg, var(--primary) 0%, #2a3f5f 100%);
  border-radius: var(--radius);
  padding: 48px 40px;
  color: #fff;
  text-align: center;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
}

.header::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -20%;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(201,168,76,0.15) 0%, transparent 70%);
  border-radius: 50%;
}

.header .company-name {
  font-size: 14px;
  letter-spacing: 4px;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 20px;
  font-weight: 500;
}

.header h1 {
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 12px;
  letter-spacing: 2px;
}

.header .subtitle {
  font-size: 16px;
  color: rgba(255,255,255,0.75);
  margin-bottom: 8px;
}

.header .date {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  margin-top: 16px;
}

/* ===== 通用卡片 ===== */
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 32px;
  margin-bottom: 24px;
}

.card-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 24px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--accent);
  display: flex;
  align-items: center;
  gap: 10px;
}

.card-title .icon {
  width: 32px;
  height: 32px;
  background: var(--accent-light);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

/* ===== 房屋信息 ===== */
.property-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
}

.property-item {
  padding: 16px;
  background: var(--bg);
  border-radius: 8px;
  border-left: 3px solid var(--accent);
}

.property-item .label {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.property-item .value {
  font-size: 16px;
  font-weight: 600;
  color: var(--primary);
}

/* ===== 服务模式 ===== */
.mode-compare {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-top: 16px;
}

.mode-box {
  padding: 24px;
  border-radius: 10px;
  text-align: center;
}

.mode-box.traditional {
  background: #fdf2f2;
  border: 1px solid #f5c6c6;
}

.mode-box.ours {
  background: var(--success-light);
  border: 2px solid var(--success);
}

.mode-box h4 {
  font-size: 16px;
  margin-bottom: 12px;
}

.mode-box .mode-icon {
  font-size: 32px;
  margin-bottom: 8px;
}

.mode-box ul {
  list-style: none;
  text-align: left;
  font-size: 14px;
}

.mode-box ul li {
  padding: 4px 0;
  padding-left: 20px;
  position: relative;
}

.mode-box ul li::before {
  position: absolute;
  left: 0;
}

.mode-box.traditional ul li::before { content: '✕'; color: #e74c3c; }
.mode-box.ours ul li::before { content: '✓'; color: var(--success); font-weight: 700; }

.mode-highlight {
  background: linear-gradient(135deg, var(--primary) 0%, #2a3f5f 100%);
  color: #fff;
  padding: 20px 24px;
  border-radius: 10px;
  text-align: center;
  margin-top: 20px;
  font-size: 18px;
  letter-spacing: 1px;
}

.mode-highlight span {
  color: var(--accent);
  font-weight: 700;
}

/* ===== 费用明细 ===== */
.fee-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 8px;
}

.fee-table th,
.fee-table td {
  padding: 14px 16px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}

.fee-table th {
  background: var(--bg);
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.fee-table td { font-size: 15px; }

.fee-table .amount {
  text-align: right;
  font-weight: 700;
  font-size: 16px;
}

.fee-table .highlight-row {
  background: var(--success-light);
}

.fee-table .highlight-row td {
  color: var(--success);
  font-size: 18px;
  font-weight: 700;
}

.fee-table .deposit-row {
  background: var(--accent-light);
}

.fee-table .deposit-row td {
  color: #8b6914;
  font-weight: 700;
}

.big-number {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-top: 24px;
  flex-wrap: wrap;
}

.big-number-item {
  text-align: center;
  padding: 20px 32px;
  border-radius: 10px;
}

.big-number-item.income {
  background: var(--success-light);
  border: 1px solid #a3d9b1;
}

.big-number-item.deposit {
  background: var(--accent-light);
  border: 1px solid #d4b96a;
}

.big-number-item .num {
  font-size: 36px;
  font-weight: 800;
  line-height: 1.2;
}

.big-number-item.income .num { color: var(--success); }
.big-number-item.deposit .num { color: #8b6914; }

.big-number-item .desc {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 4px;
}

/* ===== 服务承诺 ===== */
.promise-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
}

.promise-item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 20px;
  background: var(--bg);
  border-radius: 10px;
  transition: transform 0.2s;
}

.promise-item:hover { transform: translateY(-2px); }

.promise-icon {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  background: var(--accent-light);
}

.promise-item h4 {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 4px;
  color: var(--primary);
}

.promise-item p {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
}

.zero-risk {
  margin-top: 20px;
  padding: 20px 24px;
  background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
  border-radius: 10px;
  color: #fff;
  text-align: center;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 1px;
}

/* ===== 合作流程 ===== */
.timeline {
  position: relative;
  padding-left: 40px;
  margin-top: 8px;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 15px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--accent);
}

.timeline-item {
  position: relative;
  padding-bottom: 28px;
}

.timeline-item:last-child { padding-bottom: 0; }

.timeline-dot {
  position: absolute;
  left: -33px;
  top: 2px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--accent);
  border: 3px solid var(--card);
  box-shadow: 0 0 0 2px var(--accent);
}

.timeline-item h4 {
  font-size: 16px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 4px;
}

.timeline-item p {
  font-size: 14px;
  color: var(--text-secondary);
}

/* ===== 页脚 ===== */
.footer {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-secondary);
  font-size: 14px;
}

.footer .company {
  font-size: 20px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 8px;
}

.footer .phone {
  font-size: 18px;
  color: var(--accent);
  font-weight: 600;
  margin: 8px 0;
  letter-spacing: 1px;
}

.footer .slogan {
  font-style: italic;
  color: var(--text-secondary);
  margin-top: 8px;
}

/* ===== 响应式 ===== */
@media (max-width: 640px) {
  .container { padding: 12px 12px 40px; }
  .header { padding: 32px 20px; }
  .header h1 { font-size: 24px; }
  .card { padding: 20px 16px; }
  .mode-compare { grid-template-columns: 1fr; }
  .big-number { gap: 16px; }
  .big-number-item { padding: 16px 20px; }
  .big-number-item .num { font-size: 28px; }
  .property-grid { grid-template-columns: 1fr 1fr; }
  .promise-grid { grid-template-columns: 1fr; }
}

/* ===== 打印 ===== */
@media print {
  body { background: #fff; }
  .container { padding: 0; max-width: 100%; }
  .card { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; }
  .header { background: var(--primary) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .promise-item:hover { transform: none; }
  .zero-risk, .mode-highlight { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
</style>
</head>
<body>

<div class="container" id="app"></div>

<script>
const reportData = {
  owner: { name: "王女士" },
  property: {
    address: "育新花园56号楼",
    layout: "3室1厅1卫",
    area: 100,
    floor: "10/18层",
    decoration: "精装修",
    facilities: ["空调", "冰箱", "洗衣机", "热水器", "宽带"],
  },
  pricing: {
    monthlyRent: 6000,
  },
  propertyStatus: {
    needsCleaning: true,
    needsRepair: true,
  },
  company: {
    name: "省心租",
    phone: "138-8888-6688",
    slogan: "让房东省心，让租客安心",
  },
  generatedDate: "2026年3月5日",

// 自动计算费用
const p = reportData.pricing;
p.serviceFee = Math.round(p.monthlyRent / 30 * 3);
p.netIncome = p.monthlyRent - p.serviceFee;
p.deposit = p.monthlyRent * 0.5;
p.yearlyIncome = p.netIncome * 12;

function fmt(n) {
  return n.toLocaleString("zh-CN");
}

const d = reportData;
const c = d.company;
const prop = d.property;
const status = d.propertyStatus;

document.getElementById("app").innerHTML = `

    <div class="date">${d.generatedDate}</div>
  </div>

  <!-- 房屋信息 -->
  <div class="card">
    <div class="card-title"><span class="icon">🏠</span>房屋信息</div>
    <div class="property-grid">
      <div class="property-item">
        <div class="label">业主</div>
        <div class="value">${d.owner.name}</div>
      </div>
      <div class="property-item">
        <div class="label">地址</div>
        <div class="value">${prop.address}</div>
      </div>
      <div class="property-item">
        <div class="label">户型</div>
        <div class="value">${prop.layout}</div>
      </div>
      <div class="property-item">
        <div class="label">面积</div>
        <div class="value">${prop.area}㎡</div>
      </div>
      <div class="property-item">
        <div class="label">楼层</div>
        <div class="value">${prop.floor}</div>
      </div>
      <div class="property-item">
        <div class="label">装修</div>
        <div class="value">${prop.decoration}</div>
      </div>
      <div class="property-item">
        <div class="label">配套设施</div>
        <div class="value">${prop.facilities.join("、")}</div>
      </div>
      <div class="property-item">
        <div class="label">房屋现状</div>
        <div class="value">${status.needsCleaning ? "需保洁" : ""}${status.needsCleaning && status.needsRepair ? "、" : ""}${status.needsRepair ? "需维修" : ""}</div>
      </div>
    </div>
  </div>

  <!-- 服务模式 -->
  <div class="card">
    <div class="card-title"><span class="icon">💡</span>我们的服务模式</div>
    <div class="mode-compare">
      <div class="mode-box traditional">
        <div class="mode-icon">🏪</div>
        <h4>传统中介</h4>
        <ul>
          <li>赚取租金差价，租金不透明</li>
          <li>空置期业主自行承担</li>
          <li>出租后缺乏后续管理</li>
          <li>租客质量无保障</li>
        </ul>
      </div>
      <div class="mode-box ours">
        <div class="mode-icon">🏡</div>
        <h4>省心租托管</h4>
        <ul>
          <li>零差价，租金100%透明</li>
          <li>30天出租承诺，保证金兜底</li>
          <li>全流程托管，省心省力</li>
          <li>严格筛选租客，安全有保障</li>
        </ul>
      </div>
    </div>
    <div class="mode-highlight">
      每月仅收取 <span>3天租金</span> 作为服务费，一个月30天，您拿27天
    </div>
  </div>

  <!-- 费用明细 -->
  <div class="card">
    <div class="card-title"><span class="icon">📊</span>费用明细</div>
    <table class="fee-table">
      <thead>
        <tr><th>项目</th><th class="amount">金额</th></tr>
      </thead>
      <tbody>
        <tr>
          <td>建议月租金</td>
          <td class="amount">¥${fmt(p.monthlyRent)}</td>
        </tr>
        <tr>
          <td>每月服务费（3天租金）</td>
          <td class="amount">¥${fmt(p.serviceFee)}</td>
        </tr>
        <tr class="highlight-row">
          <td>✦ 您的月净收入</td>
          <td class="amount">¥${fmt(p.netIncome)}</td>
        </tr>
        <tr class="deposit-row">
          <td>✦ 保证金（签约即付给您）</td>
          <td class="amount">¥${fmt(p.deposit)}</td>
        </tr>
        <tr>
          <td>预估年净收入</td>
          <td class="amount">¥${fmt(p.yearlyIncome)}</td>

      </tbody>
    </table>

    <div class="big-number">

      </div>
      <div class="big-number-item deposit">
        <div class="num">¥${fmt(p.deposit)}</div>
        <div class="desc">签约即得保证金</div>
      </div>
    </div>
  </div>

  <!-- 服务承诺 -->
  <div class="card">
    <div class="card-title"><span class="icon">🤝</span>服务承诺</div>
    <div class="promise-grid">
      <div class="promise-item">
        <div class="promise-icon">📅</div>
        <div>
          <h4>30天出租承诺</h4>
          <p>签约后30天内成功出租，未出租则保证金归您</p>

      </div>
      <div class="promise-item">
        <div class="promise-icon">🧹</div>
        <div>

        </div>
      </div>
      <div class="promise-item">
        <div class="promise-icon">🔧</div>
        <div>
          <h4>免费基础维修</h4>
          <p>出租前免费处理维修问题，确保房屋状态良好</p>
        </div>
      </div>
      <div class="promise-item">
        <div class="promise-icon">🔐</div>
        <div>

        </div>
      </div>
      <div class="promise-item">
        <div class="promise-icon">👤</div>
        <div>
          <h4>严格租客筛选</h4>
          <p>多维度审核租客，保障您的房屋安全</p>
        </div>
      </div>
      <div class="promise-item">
        <div class="promise-icon">🛡️</div>
        <div>
          <h4>租期全程管理</h4>
          <p>日常维护、租金代收、纠纷处理一站搞定</p>
        </div>
      </div>
    </div>
    <div class="zero-risk">
      ✦ 对您来说是零风险 —— 不出租不收费，保证金+保洁维修全部归您
    </div>
  </div>

  <!-- 合作流程 -->
  <div class="card">
    <div class="card-title"><span class="icon">📋</span>合作流程</div>
    <div class="timeline">
      <div class="timeline-item">
        <div class="timeline-dot"></div>
        <h4>签约合作</h4>
        <p>签订托管协议，当场支付 ¥${fmt(p.deposit)} 保证金给您</p>
      </div>
      <div class="timeline-item">
        <div class="timeline-dot"></div>
        <h4>房屋准备</h4>
        <p>安排专业保洁、基础维修、安装智能门锁</p>
      </div>
      <div class="timeline-item">
        <div class="timeline-dot"></div>
        <h4>上架推广</h4>
        <p>多渠道发布房源，专业摄影拍摄，精准匹配租客</p>
      </div>
      <div class="timeline-item">
        <div class="timeline-dot"></div>
        <h4>租客入住</h4>
        <p>严格筛选后安排入住，签订正规租赁合同</p>
      </div>
      <div class="timeline-item">
        <div class="timeline-dot"></div>
        <h4>持续管理</h4>
        <p>日常维护、租金按时转付、租客问题全程处理</p>
      </div>
    </div>
  </div>

  <!-- 页脚 -->
  <div class="footer">
    <div class="company">${c.name}</div>
    <div class="phone">${c.phone}</div>
    <div class="slogan">「${c.slogan}」</div>
  </div>
`;
</script>

</body>
</html>
